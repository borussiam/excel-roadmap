<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>엑셀 로드맵</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <div>
        <p class="eyebrow">Excel Learning Roadmap</p>
        <h1>엑셀 로드맵</h1>
        <p class="hero__desc">개인 학습 대시보드</p>
      </div>
      <div class="hero__panel">
        <div class="progress-label">
          <span>전체 완료율</span>
          <strong id="rateText">-</strong>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-bar__fill"></div>
        </div>
        <p id="loadInfo" class="load-info">데이터를 불러오는 중...</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="stats" aria-label="요약 통계">
      <article class="stat-card">
        <span>전체</span>
        <strong id="totalCount">0</strong>
      </article>
      <article class="stat-card">
        <span>완료</span>
        <strong id="doneCount">0</strong>
      </article>
      <article class="stat-card">
        <span>진행 중</span>
        <strong id="progressCount">0</strong>
      </article>
      <article class="stat-card">
        <span>미시작</span>
        <strong id="todoCount">0</strong>
      </article>
    </section>

    <div class="control-area">
      <section class="toolbar" aria-label="검색">
        <div class="search-wrap">
          <label for="searchInput">검색</label>
          <input id="searchInput" type="search" placeholder="예: SUMPRODUCT, 드롭다운, 7005" autocomplete="off">
        </div>

        <button id="filterToggleBtn" class="ghost-btn" type="button" aria-expanded="false" aria-controls="filterPanel">
          필터 열기
        </button>
      </section>

      <section id="filterPanel" class="filter-panel" aria-label="상세 필터" hidden>
        <div class="filter-grid">
          <div class="filter-left">
            <div class="select-wrap category-filter">
              <label for="categoryFilter">대분류</label>
              <select id="categoryFilter">
                <option value="">전체</option>
              </select>
            </div>

            <div class="select-wrap status-filter">
              <span class="filter-label">상태</span>

              <div id="statusFilter" class="status-options" role="group" aria-label="상태 필터">
                <label class="check-pill">
                  <input class="status-checkbox" type="checkbox" value="미시작" checked>
                  <span>미시작</span>
                </label>

                <label class="check-pill">
                  <input class="status-checkbox" type="checkbox" value="진행중" checked>
                  <span>진행중</span>
                </label>

                <label class="check-pill">
                  <input class="status-checkbox" type="checkbox" value="완료" checked>
                  <span>완료</span>
                </label>

                <label class="check-pill">
                  <input class="status-checkbox" type="checkbox" value="보류" checked>
                  <span>보류</span>
                </label>
              </div>

              <div class="status-presets">
                <button class="status-preset-btn" type="button" data-status-preset="all">전체</button>
                <button class="status-preset-btn" type="button" data-status-preset="not-done">미완료만</button>
                <button class="status-preset-btn" type="button" data-status-preset="done">완료만</button>
                <button class="status-preset-btn" type="button" data-status-preset="progress">진행중</button>
              </div>
            </div>
          </div>
          
          <div class="filter-right">
            <div class="select-wrap level-range-filter">
              <div class="level-range__header">
                <span class="filter-label">난이도</span>
                <strong id="levelRangeText">전체</strong>
              </div>

              <div class="range-slider">
                <div class="range-slider__base"></div>
                <div id="levelRangeTrack" class="range-slider__track"></div>

                <input
                  id="levelMinRange"
                  class="range-slider__input range-slider__input--min"
                  type="range"
                  min="1"
                  max="30"
                  step="1"
                  value="1"
                  aria-label="시작 난이도 슬라이더"
                >

                <input
                  id="levelMaxRange"
                  class="range-slider__input range-slider__input--max"
                  type="range"
                  min="1"
                  max="30"
                  step="1"
                  value="30"
                  aria-label="끝 난이도 슬라이더"
                >
              </div>

              <div class="level-range__selects">
                <select id="levelMinFilter" aria-label="시작 난이도"></select>
                <span>~</span>
                <select id="levelMaxFilter" aria-label="끝 난이도"></select>
              </div>

              <div class="filter-actions">
                <button id="resetBtn" class="reset-btn" type="button">필터 초기화</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <section class="sort-bar" aria-label="정렬">
      <span class="sort-bar__label">정렬</span>

      <div class="sort-options">
        <button class="sort-btn is-active" type="button" data-sort="number">번호 ↑</button>
        <button class="sort-btn" type="button" data-sort="difficulty">난이도</button>
        <button class="sort-btn" type="button" data-sort="status">상태</button>
        <button class="sort-btn" type="button" data-sort="recent">학습일</button>
      </div>
    </section>

    <section class="result-head">
      <div>
        <h2>주제 목록</h2>
        <p><strong id="visibleCount">0</strong>개 표시 중</p>
      </div>

      <div class="view-switch" role="group" aria-label="보기 방식">
        <button class="view-btn is-active" type="button" data-view="list">목록</button>
        <button class="view-btn" type="button" data-view="card">카드</button>
      </div>
    </section>

    <section id="cards" class="cards" aria-live="polite"></section>

    <section id="emptyState" class="empty" hidden>
      <h2>조건에 맞는 주제가 없습니다.</h2>
      <p>검색어를 줄이거나 필터를 초기화해 보세요.</p>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
